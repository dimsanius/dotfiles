version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
    open-pull-requests-limit: 10
    target-branch: "main"
    labels:
      - "dependencies"

  # Maintain dependencies for pip
  - package-ecosystem: "pip"
    directory: "bootstrap"
    schedule:
      interval: "weekly"
      day: "sunday"
    open-pull-requests-limit: 10
    target-branch: "main"
    labels:
      - "dependencies"
