---
# tasks file for roles/vs_code

- name: Add repository
  become: true
  ansible.builtin.deb822_repository:
    state: present
    name: vscode
    types: deb
    uris: https://packages.microsoft.com/repos/vscode
    suites: stable
    components: main
    architectures: amd64
    signed_by: https://packages.microsoft.com/keys/microsoft.asc

- name: Install
  become: true
  ansible.builtin.apt:
    name: code
    state: present
    update_cache: true
