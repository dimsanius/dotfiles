---
# defaults file for roles/apt_repositories
apt_repositories_repos:
  - name: brave-browser
    uris: https://brave-browser-apt-release.s3.brave.com/
    suites: stable
    components: main
    signed_by: https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
    package: brave-browser

  - name: vscode
    uris: https://packages.microsoft.com/repos/vscode
    suites: stable
    components: main
    signed_by: https://packages.microsoft.com/keys/microsoft.asc
    package: code

  - name: tailscale
    uris: https://pkgs.tailscale.com/stable/ubuntu
    suites: noble
    components: main
    signed_by: https://pkgs.tailscale.com/stable/ubuntu/noble.noarmor.gpg
    package: tailscale

  - name: sublime-text
    uris: https://download.sublimetext.com/
    suites: apt/stable/
    signed_by: https://download.sublimetext.com/sublimehq-pub.gpg
    package: sublime-text

  - name: fastfetch
    uris: https://ppa.launchpadcontent.net/zhangsongcui3371/fastfetch/ubuntu
    suites: noble
    components: main
    signed_by: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xEB65EE19D802F3EB1A13CFE47E2E5CB4D4865F21
    package: fastfetch
