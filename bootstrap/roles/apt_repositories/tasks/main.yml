---
# tasks file for roles/apt_repositories
- name: Add APT repositories
  become: true
  ansible.builtin.deb822_repository:
    state: present
    name: "{{ item.name }}"
    types: deb
    uris: "{{ item.uris }}"
    suites: "{{ item.suites }}"
    components: "{{ item.components | default(omit) }}"
    architectures: amd64
    signed_by: "{{ item.signed_by }}"
  loop: "{{ apt_repositories_repos }}"
  register: apt_repositories_repo_result

- name: Update APT cache
  become: true
  ansible.builtin.apt:
    update_cache: true
  when: apt_repositories_repo_result.changed

- name: Install packages
  become: true
  ansible.builtin.apt:
    name: "{{ item.package }}"
    state: present
  loop: "{{ apt_repositories_repos }}"
