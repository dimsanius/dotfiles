---
# tasks file for roles/tailscale

- name: Add repository
  become: true
  ansible.builtin.deb822_repository:
    state: present
    name: tailscale
    types: deb
    uris: https://pkgs.tailscale.com/stable/ubuntu
    suites: noble
    components: main
    architectures: amd64
    signed_by: https://pkgs.tailscale.com/stable/ubuntu/noble.noarmor.gpg

- name: Install
  become: true
  ansible.builtin.apt:
    name: tailscale
    state: present
    update_cache: true
