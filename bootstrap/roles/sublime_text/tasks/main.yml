---
# tasks file for roles/sublime_text

- name: Ensure keyrings directory exists
  become: true
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add repository
  become: true
  ansible.builtin.deb822_repository:
    state: present
    name: sublime-text
    types: deb
    uris: https://download.sublimetext.com/
    suites: apt/stable/
    # Apparently, such component does not exist within this repo.
    # Hence, do not add it
    # components: main
    architectures: amd64
    signed_by: https://download.sublimetext.com/sublimehq-pub.gpg

- name: Install
  become: true
  ansible.builtin.apt:
    name: sublime-text
    state: present
    update_cache: true
