---
# tasks file for roles/gnome_extensions
- name: Install
  ansible.builtin.command: >
    gext install {{ item }}
  loop: "{{ gnome_extensions_to_install }}"
  register: gnome_extensions_install_result
  changed_when: >
    'Download' in gnome_extensions_install_result.stdout or
    'Extract' in gnome_extensions_install_result.stdout or
    'Enable' in gnome_extensions_install_result.stdout
