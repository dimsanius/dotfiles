---
# tasks file for roles/brave

- name: Ensure keyrings directory exists
  become: true
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add repository
  become: true
  ansible.builtin.deb822_repository:
    name: brave-browser
    state: present
    types: deb
    uris: https://brave-browser-apt-release.s3.brave.com/
    suites: stable
    components: main
    architectures: amd64
    signed_by: https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg

- name: Install
  become: true
  ansible.builtin.apt:
    name: brave-browser
    state: present
    update_cache: true
