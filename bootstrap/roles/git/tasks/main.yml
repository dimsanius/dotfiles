---
# tasks file for roles/git
# TODO: Convert this to template or even allow it to be managed by chezmoi
- name: Set git commit user name and personal email
  when: environment_type == "personal"
  ansible.builtin.copy:
    src: gituser_personal
    dest: "{{ ansible_facts['env']['HOME'] }}/.gituser"
    mode: "0600"

- name: Set git commit user name and work email
  when: environment_type == "work"
  ansible.builtin.copy:
    src: gituser_work
    dest: "{{ ansible_facts['env']['HOME'] }}/.gituser"
    mode: "0600"
