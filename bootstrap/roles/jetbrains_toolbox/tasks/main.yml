---
# tasks file for roles/jetbrains_toolbox
- name: Create install directory
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.local/share/JetBrains/Toolbox/bin/"
    state: directory
    mode: "0775"

- name: Install toolbox
  ansible.builtin.unarchive:
    src: "https://download.jetbrains.com/toolbox/{{ jetbrains_toolbox_archive }}"
    dest: "{{ ansible_facts['env']['HOME'] }}/.local/share/JetBrains/Toolbox/bin/"
    remote_src: true
    extra_opts:
      - --strip-components=2
    creates: "{{ ansible_facts['env']['HOME'] }}/.local/share/JetBrains/Toolbox/bin/jetbrains-toolbox"

- name: Run
  ansible.builtin.command: "{{ ansible_facts['env']['HOME'] }}/.local/share/JetBrains/Toolbox/bin/jetbrains-toolbox"
  async: 3600
  poll: 0
  changed_when: false
