---
# tasks file for roles/fastfetch

- name: Add repository
  become: true
  ansible.builtin.deb822_repository:
    name: fastfetch
    types: [deb]
    uris: https://ppa.launchpadcontent.net/zhangsongcui3371/fastfetch/ubuntu
    suites: "{{ ansible_facts['distribution_release'] }}"
    components: [main]
    signed_by: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xEB65EE19D802F3EB1A13CFE47E2E5CB4D4865F21

- name: Install
  become: true
  ansible.builtin.apt:
    name: fastfetch
    state: present
    update_cache: true
