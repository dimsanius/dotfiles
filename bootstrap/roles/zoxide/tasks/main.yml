---
# tasks file for roles/zoxide
- name: Install
  ansible.builtin.shell: >
    sh -c "$(curl -fsSL https://raw.githubusercontent.com/ajeetdsouza/zoxide/main/install.sh)"
  args:
    executable: /bin/bash
    creates: "{{ ansible_facts['env']['HOME'] }}/.local/bin/zoxide"
