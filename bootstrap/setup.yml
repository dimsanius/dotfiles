---
# - Run current script: ./run_ansible.bash
- name: Machine setup
  hosts: localhost
  connection: local
  gather_facts: true

  pre_tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - data is defined
          - data.target_env is defined
          - data.target_env in ['work', 'personal']
        quiet: true
        fail_msg: >
          Required variables are missing or invalid.
          See the failed assertion for details.

    - name: Ensure APT keyrings directory exists
      become: true
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

  roles:
    - packages
    - gnome_extensions
    - jetbrains_toolbox
    - omz
    - omz_addons
    - vim
    - apt_repositories
    - zoxide
    - font_cache
    - role: slack
      when: data.target_env == "work"
    # Ensure to run Timeshift as a last task
    - timeshift
