---
# - Run current script: ansible-playbook ./setup.yml --ask-become-pass
# - For dev: install ansible-lint: pip install ansible-lint
- name: Machine setup
  hosts: localhost
  connection: local
  gather_facts: true

  pre_tasks:
    - name: Validate required variables
      assert:
        that:
          - data is defined
          - data.target_env is defined
          - data.target_env in ['work', 'personal']
        fail_msg: "Required variables are missing or invalid"

  roles:
    - packages
    - gnome_extensions
    - jetbrains_toolbox
    - omz
    - omz_addons
    - vim
    - brave
    - vs_code
    - sublime_text
    - tailscale
    - zoxide
    - font_cache
    - role: slack
      when: data.target_env == "work"
    # Ensure to run Timeshift as a last task
    - timeshift
