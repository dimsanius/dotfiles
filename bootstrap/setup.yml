---
# - Run current script: ansible-playbook ./setup.yml --ask-become-pass
# - For dev: install ansible-lint: pip install ansible-lint
- name: Machine setup
  hosts: localhost
  connection: local
  gather_facts: true

  roles:
    - packages
    - gnome_extensions
    - jetbrains_toolbox
    - omz
    - omz_addons
    - vim
    - brave
    - vs_code
    - sublime_text
    - zoxide
    - font_cache
    - role: slack
      when: target_env == "work"
    # Ensure to run Timeshift as a last task
    - timeshift
