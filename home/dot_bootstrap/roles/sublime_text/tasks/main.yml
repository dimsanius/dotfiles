---
# tasks file for roles/sublime_text
- name: Ensure keyrings directory exists
  become: true
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download GPG key
  become: true
  ansible.builtin.get_url:
    url: https://download.sublimetext.com/sublimehq-pub.gpg
    dest: /etc/apt/keyrings/sublimehq.gpg
    mode: "0644"

- name: Add repository
  become: true
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/etc/apt/keyrings/sublimehq.gpg arch=amd64]
      https://download.sublimetext.com/ apt/stable/
    filename: sublime-text
    state: present

- name: Install package
  become: true
  ansible.builtin.apt:
    name: sublime-text
    state: present
    update_cache: true
