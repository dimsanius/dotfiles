---
# tasks file for roles/sublime_text
- name: Sublime Text | Ensure keyrings directory exists
  become: true
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Sublime Text | Install GPG key
  become: true
  ansible.builtin.get_url:
    url: https://download.sublimetext.com/sublimehq-pub.gpg
    dest: /etc/apt/keyrings/sublimehq-pub.asc
    mode: "0644"

- name: Sublime Text | Add APT source (deb822 format)
  become: true
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/sublime-text.sources
    content: |
      Types: deb
      URIs: https://download.sublimetext.com/
      Suites: apt/stable/
      Signed-By: /etc/apt/keyrings/sublimehq-pub.asc
    mode: "0644"

- name: Sublime Text | Install package
  become: true
  ansible.builtin.apt:
    name: sublime-text
    state: present
    update_cache: true
