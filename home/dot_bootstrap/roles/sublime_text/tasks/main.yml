---
# tasks file for roles/sublime_text
- name: Ensure keyrings directory exists
  become: true
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Install GPG key
  become: true
  ansible.builtin.get_url:
    url: https://download.sublimetext.com/sublimehq-pub.gpg
    dest: /etc/apt/keyrings/sublimehq-pub.asc
    mode: "0644"

# TODO: SublimeText use really weird deb822 format which does not
# fit strict checking. Hence, write it in manually. Update this when/if
# SublimeText change their approach
- name: Add Sublime Text repo
  become: true
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/sublime-text.sources
    mode: "0644"
    content: |
      Types: deb
      URIs: https://download.sublimetext.com/
      Suites: apt/stable/
      Signed-By: /etc/apt/keyrings/sublimehq-pub.asc

- name: Install package
  become: true
  ansible.builtin.apt:
    name: sublime-text
    state: present
    update_cache: true
