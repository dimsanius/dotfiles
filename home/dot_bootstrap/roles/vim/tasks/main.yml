---
# tasks file for roles/vim
- name: Ensure autoload directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.vim/autoload"
    state: directory
    mode: "0750"

- name: Install vim-plug
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim
    dest: "{{ ansible_facts['env']['HOME'] }}/.vim/autoload/plug.vim"
    mode: "0644"

- name: Install plugins (if not already installed)
  ansible.builtin.command: vim +PlugInstall +qall
  args:
    creates: "{{ ansible_facts['env']['HOME'] }}/.vim/plugged"
