---
# tasks file for roles/jetbrains_toolbox
- name: Create JetBrains Toolbox install directory
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.local/share/JetBrains/Toolbox/bin/"
    state: directory
    mode: "0775"

- name: Download JetBrains Toolbox
  ansible.builtin.get_url:
    url: https://download.jetbrains.com/toolbox/{{ jetbrains_toolbox_archive }}
    dest: /tmp/{{ jetbrains_toolbox_archive }}
    mode: "0644"

- name: Extract JetBrains Toolbox
  ansible.builtin.unarchive:
    src: /tmp/{{ jetbrains_toolbox_archive }}
    dest: "{{ ansible_env.HOME }}/.local/share/JetBrains/Toolbox/bin/"
    remote_src: true
    extra_opts:
      - --strip-components=2

- name: Find extracted folder
  ansible.builtin.find:
    paths: "{{ ansible_env.HOME }}/.local/share/JetBrains/Toolbox/bin/"
    patterns: "jetbrains-toolbox-*"
    file_type: directory
  register: toolbox_dir

- name: Run Toolbox installer
  ansible.builtin.command: "{{ ansible_env.HOME }}/.local/share/JetBrains/Toolbox/bin/jetbrains-toolbox &"
  async: 3600
  poll: 0
