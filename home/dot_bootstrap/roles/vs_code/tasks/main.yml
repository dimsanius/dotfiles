---
# tasks file for roles/vs_code
- name: Ensure keyrings directory exists
  become: true
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download key
  become: true
  ansible.builtin.get_url:
    url: https://packages.microsoft.com/keys/microsoft.asc
    dest: /tmp/microsoft.asc
    mode: "0644"

- name: Dearmor key
  become: true
  ansible.builtin.command: >
    gpg --dearmor -o /etc/apt/keyrings/microsoft.gpg /tmp/microsoft.asc
  args:
    creates: /etc/apt/keyrings/microsoft.gpg

- name: Add repository
  become: true
  ansible.builtin.deb822_repository:
    name: vscode
    state: present
    types: deb
    uris: https://packages.microsoft.com/repos/vscode
    suites: stable
    components: main
    architectures: amd64
    signed_by: /etc/apt/keyrings/microsoft.gpg

- name: Install
  become: true
  ansible.builtin.apt:
    name: code
    state: present
    update_cache: true
