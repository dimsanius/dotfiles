---
# tasks file for roles/env_selector
# TODO: Consider some kind of a different approach here, maybe via chezmoi
- name: Set personal environment
  when: environment_type == "personal"
  ansible.builtin.copy:
    src: personal_env_selector.sh
    dest: "{{ ansible_env.HOME }}/.env_selector.sh"
    mode: "0664"

- name: Set work environment
  when: environment_type == "work"
  ansible.builtin.copy:
    src: work_env_selector.sh
    dest: "{{ ansible_env.HOME }}/.env_selector.sh"
    mode: "0664"
